<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>OMEN Brand Guidelines 2026</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="progress" aria-hidden="true"><span id="progressBar"></span></div>

    <header class="topbar">
      <a class="brand-mark" href="#page-1" aria-label="Go to cover">
        <span>OMEN</span>
        <small>Brand Guidelines 2026</small>
      </a>

      <div class="controls" aria-label="Document controls">
        <button class="icon-button" id="prevPage" type="button" aria-label="Previous page" title="Previous page">
          <span aria-hidden="true">↑</span>
        </button>
        <span class="page-readout" id="pageReadout">01 / 35</span>
        <button class="icon-button" id="nextPage" type="button" aria-label="Next page" title="Next page">
          <span aria-hidden="true">↓</span>
        </button>
        <a class="icon-button" href="./assets/brand-guidelines-v2.pdf" target="_blank" rel="noreferrer" aria-label="Open PDF" title="Open PDF">
          <span aria-hidden="true">↗</span>
        </a>
      </div>
    </header>

    <aside class="rail" aria-label="Page navigation">
      <nav id="pageNav"></nav>
    </aside>

    <main class="viewer" id="viewer">
      <section class="page-stack" id="pageStack" aria-label="Brand guideline pages"></section>
    </main>

    <div class="loader" id="loader" role="status" aria-live="polite">
      <span class="loader-ring" aria-hidden="true"></span>
      <span>Loading brand guideline pages</span>
    </div>

    <script type="module" src="./app.js"></script>
  </body>
</html>
